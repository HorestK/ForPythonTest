name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1. Скачиваем код вашего репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем стабильную версию Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Устанавливаем системные библиотеки Linux для сборки Android
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev zlib1g-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev libffi-dev uuid-dev devscripts
          sudo apt-get install -y aidl libtool autoconf automake ccache gettext pkg-config

      # 4. Устанавливаем Java 17 (официальный метод для GitHub)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. Устанавливаем сам Buildozer и компилятор Cython
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install --upgrade buildozer cython virtualenv

      # 6. Запускаем сборку APK
      - name: Build APK with Buildozer
        run: |
          # Команда 'yes |' автоматически согласится со всеми лицензиями Android SDK во время сборки
          yes | buildozer -v android debug

      # 7. Сохраняем готовый APK файл в артефакты (Используем новую версию v4!)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pizza-app-package
          path: bin/*.apk