name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1. Скачиваем код вашего репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем стабильную версию Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Устанавливаем системные библиотеки Linux для сборки Android
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev zlib1g-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev libffi-dev uuid-dev devscripts
          sudo apt-get install -y aidl libtool autoconf automake ccache gettext pkg-config

      # 4. Устанавливаем Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. Устанавливаем Buildozer и компилятор Cython
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install --upgrade buildozer cython virtualenv

      # 6. АВТОМАТИЧЕСКОЕ СОЗДАНИЕ buildozer.spec С НАСТРОЙКАМИ ПИЦЦЫ
      - name: Auto-generate buildozer.spec
        run: |
          cat << 'EOF' > buildozer.spec
          [app]
          title = Pizza Order
          package.name = pizzaapp
          package.domain = org.pizza
          source.dir = .
          source.include_exts = py,png,jpg,jpeg,kv
          version = 0.1
          requirements = python3,kivy,kivymd
          orientation = portrait
          fullscreen = 1
          android.minapi = 21
          android.api = 34
          android.ndk_api = 21
          android.permissions = INTERNET
          android.archs = armeabi-v7a, arm64-v8a
          android.allow_backup = True
          [buildozer]
          log_level = 2
          warn_on_root = 1
          EOF

      # 7. Запускаем сборку APK
      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android debug

      # 8. Сохраняем готовый APK файл в артефакты
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pizza-app-package
          path: bin/*.apk